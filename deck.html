<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="utf-8">
   <meta name="viewport" content="width=device-width, initial-scale=1">
   <title>Decku</title>
   <meta name="description" content="Decku - Flashcard Deck Web Application">
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
   <link rel="stylesheet" href="./css/style.css">
   <link rel="icon" type="image/png" href="favicon.png">
</head>

<body>
   <nav class="navbar bg-dark">
      <div class="container-fluid">
         <a class="navbar-brand text-warning" href="/">Decku - Flashcard Deck Web Application</a>
      </div>
   </nav>
   <div class="container">
      <div class="d-flex justify-content-between align-items-center">
         <h2 id="deck-name-value" class="mt-2"></h2>
         <div>
            <button type="button" id="btn-back-to-decks" class="btn btn-secondary" id="btn-back">Back to Decks</button>
            <button type="button" id="btn-delete-deck" class="btn btn-danger">Delete Deck</button>
         </div>
      </div>
   </div>
   <hr>
   <div class="container cards">
      <button type="button" class="btn btn-primary" id="btn-add-card">Add Flashcard</button>
      <ul id="cards">
         <li class="card-item">
            <div class="d-flex justify-content-between align-items-center">
               <p><span> Q: What is the capital of France?</span>
                  <br>
                  <span> A: Paris</span>
               </p>
               <div>
                  <button type="button" class="btn btn-secondary btn-sm">Edit</button>
                  <button type="button" class="btn btn-danger btn-sm">Delete</button>
               </div>
            </div>
         </li>
      </ul>
   </div>
   <div class="modal" id="flashcardModal" tabindex="-1" role="dialog">
      <div class="modal-dialog">
         <div class="modal-content">
            <div class="modal-header">
               <h5 class="modal-title">Add Flashcard</h5>
               <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
               <form>
                  <div class="form-group">
                     <label>Question</label>
                     <input type="text" class="form-control" id="questionField">
                  </div>
                  <div class="form-group">
                     <label>Answer</label>
                     <input type="text" class="form-control" id="answerField">
                  </div>
               </form>
            </div>
            <div class="modal-footer">
               <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
               <button type="button" class="btn btn-primary" id="saveCard">Save Flashcard</button>
            </div>
         </div>
      </div>
   </div>

   <footer class="footer fixed-bottom">
      <!-- Footer content -->
      <nav class="navbar bg-dark container-fluid">
         <div class="ms-auto px-2">
            <a class="text-danger" href="https://www.ccsf.edu/" target="_blank">City College of San Francisco</a>
            <p class="text-white">CS 177 - Software Engineering</p>
         </div>
      </nav>
   </footer>
   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"
      integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy"
      crossorigin="anonymous"></script>
   <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
   <script src="js/deck.js"></script>
</body>

</html>
